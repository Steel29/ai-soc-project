# docker/compose/infrastructure.yml
# Persistent backing services for the SOC AI stack.
#
# Start : docker compose -f docker/compose/infrastructure.yml up -d
# Stop  : docker compose -f docker/compose/infrastructure.yml down
# Wipe  : docker compose -f docker/compose/infrastructure.yml down -v
#
# Image tags are pinned. Before a non-dev deployment verify each tag against
# the upstream registry and update accordingly.

networks:
  socai-net:
    driver: bridge

volumes:
  redpanda-data:
  opensearch-data:
  qdrant-data:
  minio-data:
  postgres-data:

services:

  # ---------------------------------------------------------------------------
  # Message bus — Redpanda (Kafka-compatible)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command: >
      redpanda start
      --overprovisioned
      --smp 2
      --memory 2G
      --node-id 0
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
      --pandaproxy-addr 0.0.0.0:8082
      --advertise-pandaproxy-addr redpanda:8082
      --schema-registry-addr 0.0.0.0:8081
      --rpc-addr 0.0.0.0:33145
      --advertise-rpc-addr redpanda:33145
    ports:
      - "9092:9092"   # Kafka
      - "9644:9644"   # Admin API
      - "8081:8081"   # Schema registry
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - socai-net
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:v2.7.0
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda
    networks:
      - socai-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Search and analytics — OpenSearch
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - socai-net
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    container_name: opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - socai-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Vector store — Qdrant
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.3
    container_name: qdrant
    ports:
      - "6333:6333"   # REST / gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - socai-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Object storage — MinIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-socai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_2026}
    volumes:
      - minio-data:/data
    networks:
      - socai-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Relational database — PostgreSQL (analyst feedback, event metadata)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.6-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-socai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_pg_2026}
      POSTGRES_DB: ${POSTGRES_DB:-socai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socai-net
    restart: unless-stopped
